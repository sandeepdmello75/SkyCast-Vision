<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SkyCast Vision - AI Weather Classifier</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3B82F6",
                        "background": "#020617",
                        "surface-container": "#0f172a",
                    },
                    fontFamily: { "body": ["Inter"] }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
            position: relative;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="selection:bg-primary/30 selection:text-white">

<header class="fixed top-0 w-full z-50 bg-slate-950/40 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-2xl">cloudy</span>
            <h1 class="text-xl font-bold tracking-tighter text-white">SkyCast Vision</h1>
        </div>
        <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold border border-primary/30">SD</div>
    </div>
</header>

<main class="pt-32 pb-24 px-6 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-20 items-start">
        <div class="lg:col-span-5 space-y-6">
            <h2 class="text-[3.5rem] font-extrabold leading-[1.1] tracking-tight text-white">
                Atmospheric <br><span class="text-primary">Intelligence</span>.
            </h2>
            <p class="text-slate-400 text-lg leading-relaxed">
                Upload a photo of the sky to identify weather conditions using your custom-trained AI model.
            </p>
        </div>

        <div class="lg:col-span-7">
            <div class="glass-card rounded-2xl overflow-hidden shadow-2xl">
                <div class="flex px-8 pt-8 border-b border-white/5">
                    <button class="pb-4 mr-8 text-sm font-semibold text-primary border-b-2 border-primary">Upload File</button>
                </div>
                <div class="p-8">
                    <div class="group cursor-pointer" id="upload-zone">
                        <div class="relative w-full aspect-[16/9] bg-slate-950/50 rounded-xl border-2 border-dashed border-white/10 hover:border-primary/40 hover:bg-primary/5 transition-all flex flex-col items-center justify-center gap-4">
                            <span class="material-symbols-outlined text-3xl text-primary">cloud_upload</span>
                            <div class="text-center">
                                <p class="text-white font-semibold text-lg">Click to upload sky photo</p>
                                <p class="text-slate-500 text-sm mt-1">Supports JPG, PNG</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
        <div class="md:col-span-4 flex flex-col gap-6">
            <div class="glass-card rounded-2xl p-8 shadow-xl relative overflow-hidden">
                <h3 class="text-[0.6875rem] font-bold text-slate-500 tracking-widest uppercase mb-8">Classification Result</h3>
                <div class="space-y-2">
                    <div id="weather-result" class="text-[3rem] font-bold text-white flex items-center gap-3">
                        Waiting... ☁️
                    </div>
                    <div class="flex justify-between items-end">
                        <span id="confidence-value" class="text-3xl font-extralight text-primary">0%</span>
                        <span class="text-sm font-medium text-slate-500 mb-1">Confidence Score</span>
                    </div>
                </div>
                <div class="mt-8 h-1.5 w-full bg-slate-900 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-primary w-0 transition-all duration-500"></div>
                </div>
            </div>
        </div>

        <div class="md:col-span-8">
            <div class="relative rounded-2xl overflow-hidden glass-card aspect-video h-full">
                <img id="image-preview" src="https://images.unsplash.com/photo-1534088568595-a066f710b81f?q=80&w=1000&auto=format&fit=crop" class="w-full h-full object-cover opacity-50">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-transparent to-transparent"></div>
            </div>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const uploadZone = document.getElementById('upload-zone');
        const resultElement = document.getElementById('weather-result');
        const confidenceElement = document.getElementById('confidence-value');
        const progressBar = document.getElementById('progress-bar');
        const imagePreview = document.getElementById('image-preview');

        const weatherIcons = { 'Sunny': '☀️', 'Cloudy': '☁️', 'Rainy': '🌧️' };

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);

        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            if (e.target.files.length === 0) return;
            const file = e.target.files[0];
            
            // Preview selected image
            imagePreview.src = URL.createObjectURL(file);
            imagePreview.classList.remove('opacity-50');
            imagePreview.classList.add('opacity-100');

            // UI Loading state
            resultElement.innerText = 'Analyzing... ⏳';
            confidenceElement.innerText = '--%';
            progressBar.style.width = '0%';

            const formData = new FormData();
            formData.append('file', file);

            try {
                // IMPORTANT: Ensure this URL exactly matches your FastAPI address
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'success') {
                    const icon = weatherIcons[data.prediction] || '✨';
                    resultElement.innerText = `${data.prediction} ${icon}`;
                    confidenceElement.innerText = `${data.confidence}%`;
                    progressBar.style.width = `${data.confidence}%`;
                } else {
                    resultElement.innerText = 'Error ⚠️';
                    console.error("Model Error:", data.message);
                }
            } catch (error) {
                resultElement.innerText = 'Offline 🔌';
                console.error("Connection Error:", error);
                alert("Make sure your Python API is running in the terminal!");
            }
        });
    });
</script>

</body>
</html>
