<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SkyCast Vision - AI Weather Classifier</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

            theme: {
                extend: {

                        "on-tertiary": "#fcf7ff", "error-container": "#fe8983", "on-secondary-fixed": "#3e3f45",
                        "primary-container": "#d8e2ff", "primary-fixed-dim": "#c3d4ff", "error": "#9f403d",
                        "surface-container-lowest": "#ffffff", "surface": "#0a0f14", "on-background": "#e2e8f0",
                        "secondary-fixed-dim": "#d4d4db", "outline": "#717c82", "surface-dim": "#cfdce3",
                        "on-primary-fixed": "#003c86", "primary-fixed": "#d8e2ff", "surface-container-highest": "#1e293b",
                        "on-surface-variant": "#94a3b8", "on-secondary-fixed-variant": "#5a5b61", "secondary-container": "#1e293b",
                        "on-primary-container": "#d8e2ff", "on-error": "#fff7f6", "outline-variant": "#334155",
                        "surface-container": "#0f172a", "tertiary": "#5f5c78", "tertiary-fixed": "#d3ceef",
                        "on-surface": "#f1f5f9", "inverse-surface": "#f8fafc", "error-dim": "#4e0309",
                        "primary": "#3B82F6", "secondary-dim": "#515359", "surface-container-low": "#111827",
                        "on-secondary-container": "#94a3b8", "secondary": "#5e5f65", "surface-tint": "#3B82F6",
                        "on-primary-fixed-variant": "#60a5fa", "inverse-on-surface": "#94a3b8", "on-tertiary-container": "#47445f",
                        "surface-container-high": "#1e293b", "on-error-container": "#752121", "tertiary-fixed-dim": "#c5c0e0",
                        "background": "#020617", "primary-dim": "#2563eb", "surface-variant": "#1e293b"

                    fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { min-height: max(884px, 100dvh); background: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%); position: relative; overflow-x: hidden; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); z-index: -1; pointer-events: none; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-effect { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%); border-radius: 50%; filter: blur(40px); z-index: -1; pointer-events: none; }

<body class="bg-background text-on-surface font-body selection:bg-primary/30 selection:text-white">
<div class="glow-effect top-[-100px] left-[-100px]"></div>
<div class="glow-effect bottom-[10%] right-[-100px]"></div>

<header class="fixed top-0 w-full z-50 bg-slate-950/40 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-2xl">cloudy</span>
            <h1 class="text-xl font-bold tracking-tighter text-white">SkyCast Vision</h1>
        </div>
        <nav class="hidden md:flex items-center gap-8">
            <a class="font-['Inter'] font-semibold tracking-tight text-lg text-primary border-b-2 border-primary pb-1" href="#">Dashboard</a>
        </nav>
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold border border-primary/30 shadow-[0_0_15px_rgba(59,130,246,0.2)]">SM</div>
        </div>
    </div>
</header>

<main class="pt-32 pb-24 px-6 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-20 items-start">
        <div class="lg:col-span-5 space-y-6">
            <h2 class="text-[3.5rem] font-extrabold leading-[1.1] tracking-tight text-white">
                Atmospheric <br><span class="text-primary drop-shadow-[0_0_20px_rgba(59,130,246,0.3)]">Intelligence</span>.
            </h2>
            <p class="text-slate-400 text-lg leading-relaxed max-w-md">
                Leverage state-of-the-art neural networks to classify sky patterns and meteorological phenomena with surgical precision.
            </p>
        </div>

        <div class="lg:col-span-7">
            <div class="glass-card rounded-2xl overflow-hidden shadow-2xl">
                <div class="flex px-8 pt-8 border-b border-white/5">
                    <button class="pb-4 mr-8 text-sm font-semibold text-primary border-b-2 border-primary transition-all">Upload File</button>
                </div>
                <div class="p-8">
                    <div class="group cursor-pointer" id="upload-zone" onclick="document.getElementById('hiddenFileInput').click()">
                        <div class="relative w-full aspect-[16/9] bg-slate-950/50 rounded-xl border-2 border-dashed border-white/10 group-hover:border-primary/40 group-hover:bg-primary/5 transition-all duration-300 flex flex-col items-center justify-center gap-4">
                            <div class="w-16 h-16 rounded-full bg-slate-900 flex items-center justify-center text-primary group-hover:scale-110 group-hover:shadow-[0_0_20px_rgba(59,130,246,0.2)] transition-all">
                                <span class="material-symbols-outlined text-3xl">cloud_upload</span>
                            </div>
                            <div class="text-center">
                                <p class="text-white font-semibold text-lg" id="status-label">Upload sky photo</p>
                                <p class="text-slate-500 text-sm mt-1">Supports JPG, PNG</p>
                            </div>
                            <input type="file" id="hiddenFileInput" class="hidden" accept="image/*" onchange="runInference()">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div
