<!DOCTYPE html>
<html>
<head>
    <title>Weather Classifier</title>
    <style>
        /* This is your original simple styling */
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        #result { margin-top: 20px; font-weight: bold; }
        .loading { color: blue; }
    </style>
</head>
<body>

    <h1>Weather Classifier</h1>
    <p>Upload an image to predict the weather (Cloudy, Rainy, or Sunny).</p>
    
    <input type="file" id="imageInput" accept="image/*">
    <br><br>
    <button id="uploadBtn" onclick="predictWeather()">Predict Weather</button>
    
    <div id="result"></div>

    <script>
    async function predictWeather() {
        const fileInput = document.getElementById('imageInput');
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('uploadBtn');

        if (fileInput.files.length === 0) {
            alert("Please select an image first!");
            return;
        }

        // Show loading state
        resultDiv.innerHTML = "<span class='loading'>Analyzing... please wait...</span>";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        try {
            // THE FIX: Uses '/predict' so it works on Render and Laptop
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.status === "success") {
                resultDiv.innerHTML = "Prediction: " + data.prediction + " (" + data.confidence + "%)";
            } else {
                resultDiv.innerText = "Error: " + data.message;
            }
        } catch (error) {
            // Handle the Render 'Cold Start' delay
            resultDiv.innerText = "Server is waking up... Try again in 10 seconds.";
            console.error("Error:", error);
        } finally {
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
